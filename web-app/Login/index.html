<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="IAprovale — entre com sua conta para buscar concursos públicos compatíveis com a sua formação.">
  <title>IAprovale — Entrar</title>

  <!-- Note: one directive that would restrict embedding in an iframe is
       intentionally omitted here — it is silently ignored when set via
       <meta http-equiv> (GitHub Pages can't send custom HTTP headers either).
       Clickjacking is instead mitigated by shared/js/boot.js's frame-busting. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self' https://iaprovalebackend.onrender.com;
    form-action 'self';
    base-uri 'self';
    object-src 'none';
  ">

  <!-- Aplica o tema e faz o frame-busting antes da primeira pintura -->
  <script src="../shared/js/boot.js"></script>

  <!-- Google Fonts: Inter (corpo/UI) + Fraunces (títulos editoriais) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Logo oficial do app na guia do navegador (favicon) e em telas iOS.
       Caminho "../assets/..." (NÃO "../homepage/assets/..."): no artifact
       montado pelo workflow, o conteúdo de web-app/homepage/ é copiado pra
       RAIZ do _site (a homepage "canônica" vive em "/"), e /homepage/ é só
       um stub de redirect sem assets próprios (ver .github/workflows/pages.yml
       e a decisão registrada em 06-01-SUMMARY.md); usar "../homepage/assets/"
       aqui resultava em 404 no logo/favicon do site publicado. -->
  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="apple-touch-icon" href="../assets/logo.png">

  <link rel="stylesheet" href="../shared/css/tokens.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="full-height login-body">

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../" aria-label="IAprovale — início">
        <span class="brand-mark" aria-hidden="true">
          <img src="../assets/logo.png" alt="" width="24" height="24" class="brand-logo">
        </span>
        <span class="brand-name">IAprovale</span>
      </a>

      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <line x1="12" y1="2" x2="12" y2="4.5"></line>
          <line x1="12" y1="19.5" x2="12" y2="22"></line>
          <line x1="2" y1="12" x2="4.5" y2="12"></line>
          <line x1="19.5" y1="12" x2="22" y2="12"></line>
          <line x1="4.9" y1="4.9" x2="6.7" y2="6.7"></line>
          <line x1="17.3" y1="17.3" x2="19.1" y2="19.1"></line>
          <line x1="4.9" y1="19.1" x2="6.7" y2="17.3"></line>
          <line x1="17.3" y1="6.7" x2="19.1" y2="4.9"></line>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="login-main full-height">
    <div class="container login-container">
      <div class="login-card">
        <h1 class="login-title">Entrar</h1>
        <p class="login-sub">Acesse sua conta para buscar concursos compatíveis com a sua formação.</p>

        <form id="login-form" novalidate>
          <div class="form-field">
            <label for="login-username">Usuário</label>
            <input id="login-username" type="text" name="username" autocomplete="username" required placeholder="Seu usuário">
          </div>

          <div class="form-field">
            <label for="login-password">Senha</label>
            <input id="login-password" type="password" name="password" autocomplete="current-password" required placeholder="Sua senha">
          </div>

          <p id="login-error" class="login-error" role="alert" aria-live="assertive" hidden></p>

          <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        </form>

        <p class="login-hint">O servidor pode levar até 1 minuto para responder na primeira vez.</p>
      </div>
    </div>
  </main>

  <script defer src="../shared/js/theme.js"></script>
  <script defer src="../shared/js/api.js"></script>
  <script defer src="js/login.js"></script>
</body>
</html>
